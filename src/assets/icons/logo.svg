<svg
    xmlns="http://www.w3.org/2000/svg"
    width="512"
    height="512"
    viewBox="0 0 512 512"
    fill="none">

    <defs>
        <linearGradient id="primary" x1="90" y1="80" x2="420" y2="430">
            <stop offset="0%" stop-color="#5B5FF5"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
                dx="0"
                dy="14"
                stdDeviation="16"
                flood-color="#000"
                flood-opacity="0.15"/>
        </filter>
    </defs>

    <!-- Background -->
    <rect
        x="32"
        y="32"
        width="448"
        height="448"
        rx="72"
        fill="#F8FAFC"/>

    <!-- Blue back plate -->
    <rect
        x="118"
        y="122"
        width="205"
        height="250"
        rx="34"
        fill="url(#primary)"
        filter="url(#shadow)"/>

    <!-- Front card -->
    <rect
        x="150"
        y="94"
        width="240"
        height="280"
        rx="36"
        fill="white"
        filter="url(#shadow)"/>

    <!-- Task bullets -->
    <circle cx="188" cy="155" r="10" fill="#4F46E5"/>
    <circle cx="188" cy="215" r="10" fill="#4F46E5"/>
    <circle cx="188" cy="275" r="10" fill="#4F46E5"/>

    <!-- Task lines -->
    <rect x="215" y="147" width="120" height="16" rx="8" fill="#D8DDF6"/>
    <rect x="215" y="207" width="140" height="16" rx="8" fill="#D8DDF6"/>
    <rect x="215" y="267" width="80" height="16" rx="8" fill="#D8DDF6"/>

    <!-- Check badge -->
    <circle
        cx="330"
        cy="310"
        r="66"
        fill="url(#primary)"
        filter="url(#shadow)"/>

    <!-- Check -->
    <path
        d="M300 309 L322 331 L360 292"
        stroke="white"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>